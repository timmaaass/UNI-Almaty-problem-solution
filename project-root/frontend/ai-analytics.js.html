<<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>AI Аналитика - Smart City</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="ai-container">
        <h1>AI Аналитик Городской Среды</h1>

        <textarea id="ai-input" placeholder="Введите данные для анализа..." style="width: 100%; height: 100px; padding:10px; border-radius:6px; margin-bottom:10px;"></textarea>

        <button id="ai-btn" style="padding:10px 20px; border:none; border-radius:6px; background:#1f6feb; color:white; cursor:pointer;">Анализировать</button>

        <div id="ai-output" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; min-height: 100px;">

        </div>
    </div>

    <script src="ai.js"></script>
