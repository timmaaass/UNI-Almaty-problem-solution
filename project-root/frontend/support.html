<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Safety - Техподдержка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <h1> SMART SAFETY </h1>
            <p>Система мониторинга Алматы</p>
        </div>
        <nav class="nav-menu">
            <a href="index.html.html" class="nav-link">Обзор</a>
            <a href="ai-analytics.js.html" class="nav-link">AI аналитика</a>
            <a href="tech-support.html" class="nav-link active">Техподдержка</a>
        </nav>
    </header>

    <main class="content-area">
        <div class="support-container">
            <div class="card">
                <div class="card-header">
                    <h3>ОТПРАВИТЬ ЗАПРОС В ТЕХОТДЕЛ</h3>
                </div>
                
                <form class="support-form">
                    <div class="form-group">
                        <label>Ваше имя (Оператор)</label>
                        <input type="text" placeholder="Введите имя..." required>
                    </div>

                    <div class="form-group">
                        <label>Тип проблемы</label>
                        <select>
                            <option>Ошибка данных в журнале</option>
                            <option>Проблема с картой</option>
                            <option>Доступ к камерам</option>
                            <option>Другое</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Описание ситуации</label>
                        <textarea rows="5" placeholder="Опишите проблему максимально подробно..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit">ОТПРАВИТЬ ОТЧЕТ</button>
                </form>
            </div>

            <div class="card contact-info">
                <div class="card-header">
                    <h3>ПРЯМАЯ СВЯЗЬ</h3>
                </div>
                <div class="contact-list">
                    <div class="contact-item">
                        <span>ГОРЯЧАЯ ЛИНИЯ:</span>
                        <strong>+7 (727) 333-00-11</strong>
                    </div>
                    <div class="contact-item">
                        <span>EMAIL:</span>
                        <strong>support@smartsafety.kz</strong>
                    </div>
                    <div class="contact-item">
                        <span>ГРАФИК:</span>
                        <strong>24/7 (БЕЗ ВЫХОДНЫХ)</strong>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
